name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Persona frontmatter lint
        run: uv run python scripts/lint_personas.py agents/*.md

      - name: Schema + structure + lint tests
        run: |
          uv run pytest tests/test_schemas.py \
                        tests/test_persona_lint.py \
                        tests/test_e2e.py \
                        -v

      - name: Persona output validation (skipped if no fixture outputs)
        run: uv run pytest tests/test_persona_output.py -v
